<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Card RPG - PixiJS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background: #1a1a2e;
      touch-action: none;
    }
    body { 
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 1600px;
      max-height: 900px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('/assets/img/battle_bg.jpg') center center no-repeat;
      background-size: cover;
      filter: blur(2px);
      z-index: 0;
    }
    #letterbox {
      display: none;
    }
    canvas {
      display: block;
      position: relative;
      z-index: 1;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }
  </style>
</head>
<body>
  <div id="letterbox"></div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
